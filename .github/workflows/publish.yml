name: Publish

# Tag-driven release: bump `version` in pyproject.toml, commit, then
#   git tag v0.6.0 && git push origin v0.6.0
#
# What this runs in order on a `v*` tag:
#   1. build         — sdist + wheel into dist/ and a .dxt into bundle/
#   2. publish-pypi  — Trusted-Publish to PyPI (OIDC, no token)
#   3. github-release — attach the .dxt bundle so users can one-click
#                       install in Claude Desktop

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel + .dxt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build Python distributions
        run: uv build

      - name: Build Desktop Extension bundle (.dxt)
        run: |
          set -euo pipefail
          mkdir -p bundle
          # .dxt is a zip with manifest.json at the root and the entry_point
          # path resolvable from the bundle root. We only ship the manifest
          # + shim; the actual MCP runs via `uvx sciple-mcp` at the user's
          # machine, fetched on demand from PyPI.
          ( cd dxt && zip -r "../bundle/sciple-mcp-${GITHUB_REF_NAME#v}.dxt" . )
          ls -lh bundle/

      - name: Upload Python dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload .dxt artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxt
          path: bundle/

  publish-pypi:
    name: Publish to PyPI via OIDC
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sciple-mcp/
    permissions:
      # Required for PyPI Trusted Publishing (OIDC). No PyPI API token needed.
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Make the release re-runnable: if this version is already on PyPI
          # (e.g. a later job failed and the tag is re-pushed), skip the upload
          # instead of failing, so publish-registry / github-release can retry.
          skip-existing: true

  github-release:
    name: Attach .dxt to the GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .dxt artifact
        uses: actions/download-artifact@v4
        with:
          name: dxt
          path: bundle/

      - name: Create / update GitHub release with .dxt
        uses: softprops/action-gh-release@v2
        with:
          files: bundle/*.dxt
          generate_release_notes: true
          fail_on_unmatched_files: true
